<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:var(--cream);font-family:var(--font-body);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.b{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.01em;}
.dot{width:6px;height:6px;border-radius:999px;}
.ok{background:#E5F1D2;color:#3F6B17;}
.ok .dot{background:#6B9B3A;}
.warn{background:#FBE8C0;color:#8B6512;}
.warn .dot{background:#C28B22;}
.err{background:#F4D2D0;color:#8B2422;}
.err .dot{background:#A52E2A;}
.neutral{background:var(--ink-05);color:var(--slate);}
.neutral .dot{background:var(--slate-light);}
.coral{background:var(--coral-15);color:#A53A20;}
.coral .dot{background:var(--coral);}
</style></head>
<body>
<span class="b ok"><span class="dot"></span>Cobrada</span>
<span class="b warn"><span class="dot"></span>Vence en 3d</span>
<span class="b err"><span class="dot"></span>Vencida</span>
<span class="b coral"><span class="dot"></span>Borrador</span>
<span class="b neutral"><span class="dot"></span>Archivado</span>
<span class="b ok">VERIFACTU OK</span>
<span class="b warn">IRPF 15%</span>
<span class="b coral">PRO</span>
</body></html>
