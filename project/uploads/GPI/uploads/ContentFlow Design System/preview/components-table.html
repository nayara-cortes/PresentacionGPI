<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:var(--cream);font-family:var(--font-body);}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--slate);font-weight:600;padding:0 14px 10px;border-bottom:1px solid var(--line);}
td{padding:14px;border-bottom:1px solid var(--line);color:var(--ink);font-variant-numeric:tabular-nums;}
.id{font-family:var(--font-mono);font-size:12px;color:var(--slate);}
.amt{font-weight:600;text-align:right;}
.tag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;}
.ok{background:#E5F1D2;color:#3F6B17;}
.warn{background:#FBE8C0;color:#8B6512;}
</style></head>
<body><table>
<thead><tr><th>Nº Factura</th><th>Cliente</th><th>Estado</th><th style="text-align:right;">Importe</th></tr></thead>
<tbody>
<tr><td class="id">FE-2026-0042</td><td>Adidas Iberia S.A.</td><td><span class="tag ok">Cobrada</span></td><td class="amt">3.500,00 €</td></tr>
<tr><td class="id">FE-2026-0043</td><td>Agencia Bewe</td><td><span class="tag warn">Pendiente</span></td><td class="amt">1.220,00 €</td></tr>
<tr><td class="id">FE-2026-0044</td><td>Patreon Studio</td><td><span class="tag ok">Cobrada</span></td><td class="amt">820,50 €</td></tr>
</tbody></table></body></html>
