<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:var(--cream);font-family:var(--font-body);display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
.btn{padding:12px 22px;border-radius:10px;font-weight:600;font-size:15px;border:none;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:8px;}
.primary{background:var(--coral);color:#fff;}
.secondary{background:var(--ink);color:var(--cream);}
.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong);}
.danger{background:transparent;color:var(--alert);border:1px solid var(--alert);}
.sm{padding:8px 14px;font-size:13px;}
</style></head>
<body>
<button class="btn primary">Generar informe</button>
<button class="btn secondary">Exportar PDF</button>
<button class="btn ghost">Cancelar</button>
<button class="btn danger">Eliminar</button>
<button class="btn primary sm">Nueva factura</button>
<button class="btn ghost sm">Ver más</button>
</body></html>
