<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:36px;background:var(--cream);font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:center;}
.c{padding:24px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:160px;}
.c1{background:var(--cream-deep);}
.c2{background:var(--ink);}
.c3{background:var(--coral);}
.c2 img,.c3 img{filter:none;}
.label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;}
.c1 .label{color:var(--slate);}
.c2 .label,.c3 .label{color:rgba(255,255,255,.7);}
</style></head>
<body>
<div class="c c1"><img src="../assets/logo-lockup.svg" height="40"><div class="label">Sobre cream</div></div>
<div class="c c2"><img src="../assets/logo-mono.svg" height="40" style="color:#FAF6F0;"><div class="label">Sobre ink</div></div>
<div class="c c3"><img src="../assets/logo-mono.svg" height="40" style="color:#FAF6F0;"><div class="label">Sobre coral</div></div>
</body></html>
