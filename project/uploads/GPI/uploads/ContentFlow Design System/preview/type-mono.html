<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:var(--cream);font-family:var(--font-mono);color:var(--ink);}
.label{font-family:var(--font-body);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--slate);margin-bottom:14px;}
.ids{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.id{background:var(--ink-05);border:1px solid var(--line);padding:6px 12px;border-radius:6px;font-size:14px;font-weight:500;}
.id .pre{color:var(--coral);}
.num{font-size:32px;font-weight:600;letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.num span{color:var(--slate-light);font-size:18px;font-weight:400;}
</style></head>
<body>
<div class="label">JetBrains Mono · IDs funcionales</div>
<div class="ids">
  <span class="id"><span class="pre">FACT_E_</span>REG</span>
  <span class="id"><span class="pre">IVA_</span>RESUMEN</span>
  <span class="id"><span class="pre">ANL_KPI_</span>INGMES</span>
  <span class="id"><span class="pre">SECU_</span>AUTH</span>
</div>
<div class="label">Cifras en tablas (tabular-nums)</div>
<div class="num">81.901,91 € <span>· 4.027,80 €</span> <span>· 25 PM</span></div>
</body></html>
