<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:var(--cream);font-family:var(--font-body);display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.kpi{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--line);box-shadow:0 1px 2px rgba(15,23,41,.04);}
.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--slate);margin-bottom:10px;}
.value{font-family:var(--font-display);font-size:42px;font-weight:700;letter-spacing:-.02em;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums;}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;margin-top:10px;font-variant-numeric:tabular-nums;}
.up{color:#6B9B3A;}
.down{color:var(--alert);}
</style></head>
<body>
<div class="kpi">
<div class="eyebrow">Ingresos del mes</div>
<div class="value">12.480 €</div>
<div class="delta up">↑ 18,4 % vs. mes ant.</div>
</div>
<div class="kpi">
<div class="eyebrow">Cobros pendientes</div>
<div class="value">3.220 €</div>
<div class="delta down">↓ 2 facturas vencidas</div>
</div>
</body></html>
