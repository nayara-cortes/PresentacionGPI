<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:var(--cream);font-family:var(--font-body);}
.row{display:flex;align-items:flex-end;gap:14px;}
.tok{display:flex;flex-direction:column;align-items:center;gap:8px;}
.bar{background:var(--coral);border-radius:4px;}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--slate);}
.px{font-family:var(--font-mono);font-size:9px;color:var(--slate-light);}
</style></head>
<body><div class="row">
  <div class="tok"><div class="bar" style="width:4px;height:4px;"></div><div class="lab">--s-1</div><div class="px">4</div></div>
  <div class="tok"><div class="bar" style="width:8px;height:8px;"></div><div class="lab">--s-2</div><div class="px">8</div></div>
  <div class="tok"><div class="bar" style="width:12px;height:12px;"></div><div class="lab">--s-3</div><div class="px">12</div></div>
  <div class="tok"><div class="bar" style="width:16px;height:16px;"></div><div class="lab">--s-4</div><div class="px">16</div></div>
  <div class="tok"><div class="bar" style="width:24px;height:24px;"></div><div class="lab">--s-6</div><div class="px">24</div></div>
  <div class="tok"><div class="bar" style="width:32px;height:32px;"></div><div class="lab">--s-8</div><div class="px">32</div></div>
  <div class="tok"><div class="bar" style="width:48px;height:48px;"></div><div class="lab">--s-12</div><div class="px">48</div></div>
  <div class="tok"><div class="bar" style="width:64px;height:64px;"></div><div class="lab">--s-16</div><div class="px">64</div></div>
  <div class="tok"><div class="bar" style="width:96px;height:96px;"></div><div class="lab">--s-24</div><div class="px">96</div></div>
</div></body></html>
