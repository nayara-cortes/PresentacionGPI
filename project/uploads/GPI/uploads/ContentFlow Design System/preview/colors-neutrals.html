<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:var(--cream);font-family:var(--font-body);}
.row{display:flex;gap:10px;margin-bottom:14px;}
.chip{flex:1;padding:14px;border-radius:10px;color:#0F1729;font-size:12px;font-weight:600;}
.chip .h{font-family:var(--font-mono);font-size:10px;font-weight:400;opacity:.7;display:block;margin-top:2px;}
.label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--slate);margin-bottom:10px;font-weight:600;}
</style></head>
<body>
<div class="label">Neutrales (ink scale)</div>
<div class="row">
  <div class="chip" style="background:#0F1729;color:#fff;">Ink<span class="h">#0F1729</span></div>
  <div class="chip" style="background:#5A6478;color:#fff;">Slate<span class="h">#5A6478</span></div>
  <div class="chip" style="background:#8A93A5;">Slate-light<span class="h">#8A93A5</span></div>
  <div class="chip" style="background:#F2EBE0;">Cream-deep<span class="h">#F2EBE0</span></div>
  <div class="chip" style="background:#fff;border:1px solid #0F17291a;">Paper<span class="h">#FFFFFF</span></div>
</div>
</body></html>
