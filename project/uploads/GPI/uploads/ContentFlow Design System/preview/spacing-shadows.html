<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:36px 28px;background:var(--cream);font-family:var(--font-body);display:flex;gap:32px;align-items:center;}
.card{width:140px;height:90px;background:#fff;border-radius:12px;display:flex;align-items:flex-end;padding:12px;font-family:var(--font-mono);font-size:11px;color:var(--slate);}
.sm{box-shadow:0 1px 2px rgba(15,23,41,.05),0 1px 3px rgba(15,23,41,.04);}
.md{box-shadow:0 4px 12px rgba(15,23,41,.06),0 2px 4px rgba(15,23,41,.04);}
.lg{box-shadow:0 16px 40px rgba(15,23,41,.10),0 6px 12px rgba(15,23,41,.05);}
</style></head>
<body>
<div class="card sm">shadow-sm</div>
<div class="card md">shadow-md</div>
<div class="card lg">shadow-lg</div>
</body></html>
