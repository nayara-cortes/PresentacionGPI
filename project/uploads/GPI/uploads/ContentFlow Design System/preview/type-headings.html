<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:var(--cream);font-family:var(--font-body);}
.scale{display:flex;flex-direction:column;gap:18px;}
.row{display:grid;grid-template-columns:80px 1fr auto;align-items:baseline;gap:24px;}
.tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--slate);}
.size{font-size:11px;font-family:var(--font-mono);color:var(--slate-light);}
h1,h2,h3{margin:0;font-family:var(--font-display);color:var(--ink);letter-spacing:-.02em;line-height:1;}
.h1-s{font-size:56px;font-weight:700;}
.h2-s{font-size:36px;font-weight:600;}
.h3-s{font-size:24px;font-weight:600;}
</style></head>
<body><div class="scale">
  <div class="row"><span class="tag">H1</span><span class="h1-s">Estimación de costes</span><span class="size">56 / 700</span></div>
  <div class="row"><span class="tag">H2</span><span class="h2-s">Componentes de coste</span><span class="size">36 / 600</span></div>
  <div class="row"><span class="tag">H3</span><span class="h3-s">Supuesto académico</span><span class="size">24 / 600</span></div>
</div></body></html>
