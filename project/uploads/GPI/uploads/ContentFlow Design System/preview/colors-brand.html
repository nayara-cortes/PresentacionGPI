<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:var(--cream);font-family:var(--font-body);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.sw{aspect-ratio:1.4/1;border-radius:14px;padding:16px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line);}
.name{font-weight:600;font-size:15px;letter-spacing:-.01em;}
.hex{font-family:var(--font-mono);font-size:11px;opacity:.7;margin-top:2px;}
</style></head>
<body><div class="grid">
  <div class="sw" style="background:#F25C3F;color:#fff;"><div class="name">Coral</div><div class="hex">#F25C3F</div></div>
  <div class="sw" style="background:#0F1729;color:#FAF6F0;"><div class="name">Ink</div><div class="hex">#0F1729</div></div>
  <div class="sw" style="background:#FAF6F0;color:#0F1729;"><div class="name">Cream</div><div class="hex">#FAF6F0</div></div>
</div></body></html>
