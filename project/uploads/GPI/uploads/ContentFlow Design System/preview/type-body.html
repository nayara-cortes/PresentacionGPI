<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:var(--cream);}
.eyebrow{font-family:var(--font-body);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--coral);margin-bottom:8px;}
.body-lg{font-family:var(--font-body);font-size:22px;line-height:1.45;color:var(--ink);margin-bottom:14px;font-weight:500;}
.body{font-family:var(--font-body);font-size:18px;line-height:1.6;color:var(--ink);margin-bottom:14px;}
.body-sm{font-family:var(--font-body);font-size:15px;line-height:1.5;color:var(--slate);margin-bottom:8px;}
.cap{font-family:var(--font-body);font-size:13px;color:var(--slate-light);}
</style></head>
<body>
<div class="eyebrow">Sección · Análisis</div>
<div class="body-lg">22 px Body LG — frase principal de slide.</div>
<div class="body">18 px Body — el texto base para párrafos descriptivos en slides de contenido detallado.</div>
<div class="body-sm">15 px Body Small — pies de tabla, notas a pie, metadatos.</div>
<div class="cap">13 px Caption — referencias, fuentes, footnotes académicos.</div>
</body></html>
