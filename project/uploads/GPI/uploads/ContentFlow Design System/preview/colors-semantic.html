<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px;background:var(--cream);font-family:var(--font-body);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.sw{aspect-ratio:1.4/1;border-radius:14px;padding:16px;display:flex;flex-direction:column;justify-content:flex-end;color:#0F1729;}
.name{font-weight:600;font-size:15px;letter-spacing:-.01em;}
.hex{font-family:var(--font-mono);font-size:11px;opacity:.65;margin-top:2px;}
.role{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;opacity:.7;margin-bottom:auto;}
</style></head>
<body><div class="grid">
  <div class="sw" style="background:#A8D86F;"><div class="role">Éxito</div><div class="name">Lime</div><div class="hex">#A8D86F</div></div>
  <div class="sw" style="background:#F2B33F;"><div class="role">Aviso</div><div class="name">Amber</div><div class="hex">#F2B33F</div></div>
  <div class="sw" style="background:#D43F3A;color:#fff;"><div class="role">Riesgo</div><div class="name">Alert</div><div class="hex">#D43F3A</div></div>
</div></body></html>
